{% extends "base.html" %}
{% load static %}
{% block content %}

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <link rel="shortcut icon" href='{% static "favicon.ico" %}' type="image/x-icon">
   <link rel="icon" href='{% static "favicon.ico" %}' type="image/x-icon">
   <!-- style -->
   <link rel="stylesheet" href='{% static "/css/sidebar.css" %}'>
   <link rel="stylesheet" href='{% static "/css/owasp-calc.css" %}'>
   <!-- CSS only -->
   <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.js"></script>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"></script>

   <title>CVSS Calculator</title>
   <style>
      .btn-group-sm>.btn,
      .btn-sm {
         --bs-btn-padding-y: .20rem;
         --bs-btn-padding-x: .4rem;
         --bs-btn-font-size: .70rem;
      }

      .alert {
         padding: 0 1rem 0 1rem;
         margin: 0 0.5rem 0 1rem;
         border-radius: 0;
      }

      h4 {
         margin-bottom: 0;
      }

      td p {
         margin-bottom: 0;
      }

      .alert.none,
      .alert.low,
      .alert.medium,
      .alert.high,
      .alert.critical {
         color: #ffffff;
      }

      .alert.none {
         background: #53aa33;
         border-color: #187a00;
      }

      .alert.low {
         background: #ffcb0d;
         border-color: #c79b00;
      }

      .alert.medium {
         background: #f9a009;
         border-color: #c07100;
      }

      .alert.high {
         background: #df3d03;
         border-color: #a50000;
      }

      .alert.critical {
         background: #cc0500;
         border-color: #930000;
      }

      .needBaseMetrics,
      .needBaseMetrics40 {
         margin-bottom: 0;
      }
   </style>
</head>

<body>
   <section class="home-section">
      <header>
         <div class="home-content">
            <i class='bx bx-menu'></i>
            <span class="text">CVSS Calculator</span> <br />
         </div>
      </header>

      <div class="container mt-3 mb-3 text-center">
         <div class="btn-group" role="group" aria-label="CVSS Version Toggle">
            <button type="button" class="btn btn-primary" id="btn-cvss31" onclick="toggleCVSS('3.1')">CVSS 3.1</button>
            <button type="button" class="btn btn-outline-primary" id="btn-cvss40" onclick="toggleCVSS('4.0')">CVSS 4.0</button>
         </div>
      </div>

      <div id="cvss31-container">
         <div id="c1" class="cvss-calculator container mt-3">
            {% include "cvss3_content.html" %}
         </div>
      </div>

      <div id="cvss40-container" style="display: none;">
         <div class="cvss-calculator container mt-3">
            {% include "cvss4_content.html" %}

         </div>
      </div>

      <hr>

      <!-- scripts -->
      <script src="https://www.first.org/cvss/calculator/cvsscalc31.js"></script>
      <script src="https://www.first.org/cvss/calculator/cvsscalc31_helptext.js"></script>
      <script src='{% static "/script/cvss-calculator.js" %}'></script>
      <script src='{% static "/script/cvss40.js" %}'></script>
      <script>
         function toggleCVSS(version) {
            if (version === '3.1') {
               document.getElementById('cvss31-container').style.display = 'block';
               document.getElementById('cvss40-container').style.display = 'none';
               document.getElementById('btn-cvss31').classList.add('btn-primary');
               document.getElementById('btn-cvss31').classList.remove('btn-outline-primary');
               document.getElementById('btn-cvss40').classList.add('btn-outline-primary');
               document.getElementById('btn-cvss40').classList.remove('btn-primary');
            } else {
               document.getElementById('cvss31-container').style.display = 'none';
               document.getElementById('cvss40-container').style.display = 'block';
               document.getElementById('btn-cvss31').classList.add('btn-outline-primary');
               document.getElementById('btn-cvss31').classList.remove('btn-primary');
               document.getElementById('btn-cvss40').classList.add('btn-primary');
               document.getElementById('btn-cvss40').classList.remove('btn-outline-primary');
               updateScores40();
            }
         }

         function updateScores40() {
            if (typeof Vector === 'undefined' || typeof CVSS40 === 'undefined') {
               console.warn("CVSS40 scripts not loaded yet.");
               return;
            }

            let vector = new Vector();
            for (let category in Vector.METRICS) {
               for (let metric in Vector.METRICS[category]) {
                  let inputName = metric + "40";
                  let checked = document.querySelector('input[name="' + inputName + '"]:checked');
                  if (checked) {
                     vector.updateMetric(metric, checked.value);
                  }
               }
            }

            let cvss40 = new CVSS40(vector.raw);

            let scoreElement = document.getElementById('baseMetricScore40');
            if (scoreElement) scoreElement.innerText = cvss40.score;

            let severityElement = document.getElementById('baseSeverity40');
            if (severityElement) {
               severityElement.innerText = "(" + cvss40.severity + ")";
               let parentAlert = severityElement.closest('.alert');
               if (parentAlert) {
                  parentAlert.className = 'alert';
                  let severity = cvss40.severity.toLowerCase();
                  if (severity === 'none') parentAlert.classList.add('none');
                  else if (severity === 'low') parentAlert.classList.add('low');
                  else if (severity === 'medium') parentAlert.classList.add('medium');
                  else if (severity === 'high') parentAlert.classList.add('high');
                  else if (severity === 'critical') parentAlert.classList.add('critical');
                  else parentAlert.classList.add('none');
               }
            }

            let vectorStringElement = document.getElementById('vectorString40');
            if (vectorStringElement) {
               vectorStringElement.value = vector.raw;
            }
         }

         function processHash() {
            var hash = window.location.hash;
            if (hash && hash.startsWith('#CVSS:4.0')) {
                toggleCVSS('4.0');
                parseCVSS40(hash.substring(1));
            } else if (hash && hash.startsWith('#CVSS:3.1')) {
                toggleCVSS('3.1');
                if (typeof setMetricsFromVector === 'function') {
                    setMetricsFromVector(hash.substring(1));
                }
            }
         }

         function parseCVSS40(vectorString) {
            if (typeof Vector === 'undefined') {
                console.warn("CVSS40 scripts not loaded yet.");
                return;
            }
            try {
                let vector = new Vector(vectorString);
                for (let category in Vector.METRICS) {
                    for (let metric in Vector.METRICS[category]) {
                        let val = vector.metrics[metric];
                        if (val) {
                           let inputName = metric + "40";
                           let radio = document.querySelector('input[name="' + inputName + '"][value="' + val + '"]');
                           if (radio) {
                               radio.checked = true;
                           }
                        }
                    }
                }
                updateScores40();
            } catch (e) {
                console.error("Error parsing CVSS 4.0 vector:", e);
            }
         }

         window.addEventListener('load', function () {
            processHash();
            updateScores40();
         });

         window.addEventListener('hashchange', processHash);
      </script>
</body>

{% endblock content %}
